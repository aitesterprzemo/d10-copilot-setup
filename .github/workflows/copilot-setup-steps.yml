name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      SESSION_USER_EMAIL: ${{ secrets.SESSION_USER_EMAIL }}
      SESSION_USER_PASSWORD: ${{ secrets.SESSION_USER_PASSWORD }}
      SESSION_USER_DISPLAY_NAME: ${{ vars.SESSION_USER_DISPLAY_NAME }}
      SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
      SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
      SMOKE_USER_DISPLAY_NAME: ${{ vars.SMOKE_USER_DISPLAY_NAME }}
    services:
      rolnopol:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-

      - name: Install Playwright browsers
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser dependencies
        if: steps.cache-browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for rolnopol service
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL is not set"
            exit 1
          fi
          TARGET_URL="${BASE_URL%/}"
          echo "Waiting for rolnopol service to be ready at ${TARGET_URL}..."
          for i in {1..30}; do
            if curl -sSf "${TARGET_URL}/health" || curl -sSf "${TARGET_URL}"; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 2 seconds..."
            sleep 2
          done
          echo "Service failed to become ready after 60 seconds"
          exit 1
